<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Mentees - SkillSwap</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; margin: 0; }
        header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; padding: 1rem 2rem; }
        nav { background: #fff; padding: 1rem 2rem; box-shadow: 0 2px 4px rgba(0,0,0,.1); display: flex; gap: 2rem; }
        nav a { text-decoration: none; color: #333; font-weight: 500; }
        .container { max-width: 1000px; margin: 2rem auto; padding: 0 2rem; }
        .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.1); padding: 1.2rem; margin-bottom: 1rem; }
        .title { color: #667eea; margin: 0 0 .4rem 0; }
        .meta { color: #666; margin-bottom: .8rem; }
        .status { display: inline-block; padding: .2rem .6rem; border-radius: 14px; background: #e9ecef; font-size: .85rem; font-weight: 600; }
        .action-row { display: flex; gap: .6rem; align-items: center; flex-wrap: wrap; margin-top: .7rem; }
        .action-btn {
            display: inline-block;
            text-decoration: none;
            background: #667eea;
            color: #fff;
            padding: .45rem .75rem;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-size: .9rem;
        }
        details.slot-box { display: inline-block; }
        details.slot-box summary {
            list-style: none;
            background: #667eea;
            color: #fff;
            padding: .45rem .75rem;
            border-radius: 4px;
            cursor: pointer;
            user-select: none;
        }
        details.slot-box summary::-webkit-details-marker { display: none; }
        .slot-form {
            margin-top: .6rem;
            padding: .6rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: #fafafa;
            display: flex;
            gap: .5rem;
            flex-wrap: wrap;
            align-items: center;
        }
    </style>
</head>
<body>
    <header>
        <h1>Mentees for Skill</h1>
    </header>
    <nav>
        <a href="/dashboard">Home</a>
        <a href="/sessions/my-sessions">Back to My Sessions</a>
        <a href="/requests/my-requests">Requests</a>
        <a href="/auth/logout">Logout</a>
    </nav>

    <div class="container">
        <div class="card" th:if="${skill != null}">
            <h2 class="title" th:text="${skill.skillName}">Skill Name</h2>
            <div class="meta">Categories: <span th:text="${skill.categoriesDisplay}">Category</span></div>
            <form th:action="@{/sessions/my-sessions/skill/{id}/delete(id=${skill.skillId})}" method="post" style="margin-top:.8rem;">
                <button type="submit" style="border:none; background:#dc3545; color:#fff; padding:.45rem .75rem; border-radius:4px; cursor:pointer;">Delete Skill Completely</button>
            </form>
        </div>

        <div class="card" th:if="${requestsForSkill == null or requestsForSkill.isEmpty()}">
            No mentees registered for this skill yet.
        </div>

        <div class="card" th:each="req : ${requestsForSkill}">
            <h3 class="title" th:text="${req.mentee.firstName + ' ' + req.mentee.lastName}">Mentee Name</h3>
            <div class="meta">Requested at: <span th:text="${#temporals.format(req.requestedAt, 'dd-MMM-yyyy HH:mm')}">Date</span></div>
            <div class="meta">Message: <span th:text="${req.message}">Message</span></div>
            <div class="meta">Status: <span class="status" th:text="${req.status}">PROPOSED</span></div>
            <div class="meta" th:if="${sessionByRequestId != null and sessionByRequestId[req.requestId] != null}">
                Slot:
                <strong th:text="${#temporals.format(sessionByRequestId[req.requestId].scheduledStart, 'dd-MMM-yyyy HH:mm')}">Start</strong>
                -
                <strong th:text="${#temporals.format(sessionByRequestId[req.requestId].scheduledEnd, 'HH:mm')}">End</strong>
                (<span class="status" th:text="${sessionByRequestId[req.requestId].status}">PENDING_MENTEE_CONFIRMATION</span>)
            </div>
            <div class="meta action-row" th:if="${req.status.name() == 'ACCEPTED' or req.status.name() == 'COMPLETED'}">
                <a th:href="@{/requests/{id}/chat(id=${req.requestId})}"
                   class="action-btn">
                    Open Chat
                </a>
                <details class="slot-box">
                    <summary>Create Slot</summary>
                    <form class="slot-form"
                          th:action="@{/sessions/my-sessions/slot/create}"
                          method="post">
                        <input type="hidden" name="requestId" th:value="${req.requestId}" />
                        <label>Start:</label>
                        <input type="datetime-local" name="startDateTime" required />
                        <label>Duration:</label>
                        <select name="durationMinutes" required>
                            <option value="30">30 mins</option>
                            <option value="45">45 mins</option>
                            <option value="60" selected>60 mins</option>
                            <option value="90">90 mins</option>
                            <option value="120">120 mins</option>
                        </select>
                        <button type="submit" class="action-btn">Save Slot</button>
                    </form>
                </details>
            </div>
        </div>
    </div>
</body>
</html>
