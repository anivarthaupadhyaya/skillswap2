<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - SkillSwap</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; margin: 0; }
        header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; padding: 1rem 2rem; }
        nav { background: #fff; padding: 1rem 2rem; box-shadow: 0 2px 4px rgba(0,0,0,.1); display: flex; gap: 2rem; }
        nav a { text-decoration: none; color: #333; font-weight: 500; }
        .container { max-width: 980px; margin: 2rem auto; padding: 0 2rem; }
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .badge { background: #667eea; color: #fff; padding: .25rem .6rem; border-radius: 999px; font-size: .82rem; }
        .btn { border: none; background: #667eea; color: #fff; padding: .45rem .75rem; border-radius: 4px; cursor: pointer; }
        .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.08); padding: 1rem; margin-bottom: .7rem; }
        .title { font-weight: 600; color: #333; margin-bottom: .3rem; }
        .meta { font-size: .86rem; color: #777; margin-bottom: .35rem; }
        .msg { color: #444; }
        .unread { border-left: 4px solid #667eea; }
    </style>
</head>
<body>
    <header><h1>Notifications</h1></header>
    <nav>
        <a href="/dashboard">Home</a>
        <a href="/requests/my-requests">Requests</a>
        <a href="/sessions/my-sessions">Sessions</a>
        <a href="/auth/logout">Logout</a>
    </nav>

    <div class="container">
        <div class="toolbar">
            <div>Unread: <span class="badge" th:text="${unreadCount}">0</span></div>
            <form method="post" action="/notifications/read-all">
                <button type="submit" class="btn">Mark all as read</button>
            </form>
        </div>

        <div class="card" th:if="${notifications == null or notifications.isEmpty()}">No notifications yet.</div>

        <div th:each="n : ${notifications}" class="card" th:classappend="${!n.isRead} ? ' unread' : ''">
            <div class="title" th:text="${n.title}">Title</div>
            <div class="meta">
                <span th:text="${n.notificationType}">TYPE</span>
                •
                <span th:text="${#temporals.format(n.createdAt, 'dd-MMM-yyyy HH:mm')}">Date</span>
            </div>
            <div class="msg" th:text="${n.message}">Message</div>
            <form th:if="${!n.isRead}" method="post" th:action="@{/notifications/{id}/read(id=${n.notificationId})}" style="margin-top:.55rem;">
                <button type="submit" class="btn">Mark as read</button>
            </form>
        </div>
    </div>
</body>
</html>
