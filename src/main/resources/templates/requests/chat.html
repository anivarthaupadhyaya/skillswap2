<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Chat - SkillSwap</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; margin: 0; }
        header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; padding: 1rem 2rem; display:flex; justify-content:space-between; align-items:center; }
        nav { background: #fff; padding: 1rem 2rem; box-shadow: 0 2px 4px rgba(0,0,0,.1); display: flex; gap: 2rem; }
        nav a { text-decoration: none; color: #333; font-weight: 500; }
        .container { max-width: 900px; margin: 1.5rem auto; padding: 0 1rem; }
        .meta { background: #fff; border-radius: 8px; padding: 1rem; box-shadow: 0 2px 8px rgba(0,0,0,.08); margin-bottom: 1rem; }
        .chat-box { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.08); padding: 1rem; min-height: 350px; max-height: 60vh; overflow-y: auto; }
        .msg { margin-bottom: 0.8rem; display: flex; flex-direction: column; }
        .mine { align-items: flex-end; }
        .bubble { max-width: 75%; padding: .6rem .8rem; border-radius: 10px; background: #e9ecef; color: #222; }
        .mine .bubble { background: #667eea; color: #fff; }
        .who { font-size: .78rem; color: #666; margin-bottom: .2rem; }
        .form { margin-top: 0.9rem; display: flex; gap: .6rem; }
        .form input { flex: 1; padding: .65rem; border: 1px solid #ddd; border-radius: 6px; }
        .btn { border: none; background: #667eea; color: #fff; border-radius: 6px; padding: .65rem 1rem; cursor: pointer; }
        .bell-link { position: relative; color: white; text-decoration: none; font-size: 1.2rem; }
        .bell-badge { position: absolute; top: -8px; right: -10px; background: #ff4d4f; color: #fff; border-radius: 999px; font-size: 0.7rem; min-width: 18px; text-align: center; padding: 1px 5px; }
    </style>
</head>
<body>
    <header>
        <h1>Request Chat</h1>
        <a href="/notifications" class="bell-link" title="Notifications">🔔
            <span class="bell-badge" th:text="${unreadCount}">0</span>
        </a>
    </header>
    <nav>
        <a href="/dashboard">Home</a>
        <a href="/requests/my-requests">Requests</a>
        <a href="/notifications">Notifications</a>
        <a th:href="@{/requests/{id}(id=${request.requestId})}">Request Detail</a>
        <a href="/auth/logout">Logout</a>
    </nav>

    <div class="container">
        <div class="meta">
            <div><strong>Skill:</strong> <span th:text="${request.skillToLearn.skillName}">Skill</span></div>
            <div><strong>Mentor:</strong> <span th:text="${request.mentor.firstName + ' ' + request.mentor.lastName}">Mentor</span></div>
            <div><strong>Mentee:</strong> <span th:text="${request.mentee.firstName + ' ' + request.mentee.lastName}">Mentee</span></div>
        </div>

        <div class="chat-box">
            <div th:if="${messages == null or messages.isEmpty()}">No messages yet. Start the chat.</div>
            <div th:each="m : ${messages}" class="msg" th:classappend="${currentUser != null and m.sender.userId == currentUser.userId} ? ' mine' : ''">
                <div class="who" th:text="${m.sender.firstName + ' • ' + #temporals.format(m.sentAt, 'dd-MMM HH:mm')}">Who</div>
                <div class="bubble" th:text="${m.message}">Message</div>
            </div>
        </div>

        <form class="form" method="post" th:action="@{/requests/{id}/chat(id=${request.requestId})}">
            <input type="text" name="message" maxlength="2000" placeholder="Type your message..." required />
            <button type="submit" class="btn">Send</button>
        </form>
    </div>
</body>
</html>
